name: Update npm downloads badge

on:
  schedule:
    - cron: "15 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          ref: master

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Update badge data
        run: node scripts/update-npm-weekly-downloads.mjs

      - name: Commit badge data
        shell: bash
        run: |
          set -euo pipefail

          if git diff --quiet -- .github/badges/npm-weekly-downloads.json; then
            echo "Badge data is already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/badges/npm-weekly-downloads.json
          git commit -m "chore: update npm downloads badge [skip ci]"
          git push origin HEAD:master
